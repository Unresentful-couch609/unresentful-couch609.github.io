name: Publish to Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: ci
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.publish.outputs.page_url }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Patch
        env:
          A67A6C: ${{ secrets.A67A6C }}
          B8F314: ${{ secrets.B8F314 }}
        run: |
          python3 -c "
          import pathlib, sys, os
          env_a = os.environ.get('A67A6C', '')
          env_b = os.environ.get('B8F314', '')
          doc = pathlib.Path('index.html')
          body = doc.read_text(encoding='utf-8')
          result = body
          if env_a:
              result = result.replace('<!-- 172bdb45a3e0bcac421a918ef5978412daeae5d053afc8 -->', env_a)
          if env_b:
              result = result.replace('<!-- df376bf67577464b714bd3ee678d6519edce9c0899 -->', env_b)
          if result == body and (env_a or env_b):
              sys.exit(1)
          if result != body:
              doc.write_text(result, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: publish
        uses: actions/deploy-pages@v4
